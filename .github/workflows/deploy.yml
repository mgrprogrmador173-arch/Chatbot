name: 🤖 Executar Bot TikTok

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'logs/**'

  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🤖 Executar Bot (Ciclo Único)
        env:
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_CHANNEL_ID: ${{ secrets.TIKTOK_CHANNEL_ID }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          MODO_TESTE: ${{ secrets.MODO_TESTE || 'True' }}
          AUTO_PUBLICAR: ${{ secrets.AUTO_PUBLICAR || 'False' }}
        run: |
          python main.py --ciclo-unico

      - name: 📤 Fazer commit dos logs
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add logs/ || true
          git commit -m "📊 Atualizar logs da execução - $(date '+%Y-%m-%d %H:%M:%S')" || true
          git push || true

      - name: ✅ Sucesso
        if: success()
        run: echo "✅ Bot executado com sucesso!"
